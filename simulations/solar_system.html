<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Solar System Simulation | Endue Learning</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #4a9fff;
      font-size: 28px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      background: rgba(20, 20, 30, 0.8);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #333;
    }

    button, label {
      background: linear-gradient(135deg, #1c1c2c 0%, #2d3d4d 100%);
      color: #fff;
      border: 1px solid #555;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #2d3d4d 0%, #3d4d5d 100%);
      border-color: #4a9fff;
      box-shadow: 0 0 10px rgba(74, 159, 255, 0.5);
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(100, 100, 150, 0.3);
      padding: 8px 12px;
      border-color: #666;
    }

    input[type="range"] {
      width: 150px;
      height: 6px;
      border-radius: 5px;
      background: #333;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4a9fff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(74, 159, 255, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4a9fff;
      cursor: pointer;
      border: none;
    }

    canvas {
      width: 100%;
      max-width: 100%;
      background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
      border: 2px solid #4a9fff;
      border-radius: 12px;
      display: block;
      box-shadow: 0 0 30px rgba(74, 159, 255, 0.2);
      height: auto;
    }

    .info-box {
      position: fixed;
      right: 20px;
      top: 120px;
      width: 320px;
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #4a9fff;
      border-radius: 12px;
      padding: 18px;
      display: none;
      z-index: 100;
      box-shadow: 0 0 25px rgba(74, 159, 255, 0.4);
      font-size: 14px;
      line-height: 1.8;
      animation: slideIn 0.3s ease;
    }

    .info-box b {
      color: #4a9fff;
      font-size: 18px;
      display: block;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #4a9fff;
      padding-bottom: 8px;
    }

    .info-item {
      display: block;
      margin: 8px 0;
      color: #ddd;
    }

    .info-item strong {
      color: #4a9fff;
      font-weight: 600;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .quiz-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.95);
      padding: 16px 24px;
      border-radius: 10px;
      border: 2px solid #4a9fff;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 0 20px rgba(74, 159, 255, 0.4);
      z-index: 99;
    }

    #quizResult {
      margin-left: 10px;
      font-weight: 700;
      color: #4a9fff;
    }

    .instructions {
      background: rgba(74, 159, 255, 0.1);
      border-left: 4px solid #4a9fff;
      padding: 12px;
      margin-top: 15px;
      border-radius: 6px;
      font-size: 12px;
      color: #bbb;
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
      }

      button, label {
        width: 100%;
        text-align: center;
      }

      .info-box {
        width: 90vw;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        top: auto;
        bottom: 100px;
        max-width: 300px;
      }

      h1 {
        font-size: 22px;
      }

      canvas {
        border-radius: 8px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 10px;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 15px;
      }

      .controls {
        gap: 8px;
        padding: 10px;
      }

      .info-box {
        width: 95vw;
        font-size: 13px;
        padding: 14px;
      }

      .quiz-box {
        font-size: 13px;
        padding: 12px 16px;
        bottom: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🪐 Solar System Educational Simulation</h1>
  
  <!-- Controls -->
  <div class="controls">
    <button id="pauseBtn">⏸️ Pause</button>
    <button id="playBtn">▶️ Play</button>
    <button id="teacherBtn">📚 Teacher Mode</button>
    <button id="resetBtn">🔄 Reset</button>
    
    <label>
      ⚡ Speed:
      <input type="range" id="speedControl" min="0.1" max="3" step="0.1" value="1">
    </label>

    <label>
      🔍 Zoom:
      <input type="range" id="zoomControl" min="0.5" max="3" step="0.1" value="1">
    </label>
  </div>

  <!-- Canvas -->
  <canvas id="solarCanvas" width="1200" height="700"></canvas>

  <!-- Instructions -->
  <div class="instructions">
    💡 <strong>How to use:</strong> Hover over planets to see details • Click Teacher Mode for educational info • Use Speed to adjust animation • Zoom to get closer view
  </div>
</div>

<!-- Info Panel -->
<div id="infoBox" class="info-box"></div>

<!-- Quiz -->
<div id="quizBox" class="quiz-box">
  🎯 <strong id="quizQuestion">Find Jupiter</strong><span id="quizResult"></span>
</div>

<script>
  const canvas = document.getElementById("solarCanvas");
  const ctx = canvas.getContext("2d");
  const infoBox = document.getElementById("infoBox");

  let zoom = 1;
  let speed = 1;
  let paused = false;
  let teacherMode = false;
  let hovered = null;
  let quizTarget = "Jupiter";

  const center = { x: canvas.width / 2, y: canvas.height / 2 };

  function loadImg(name) {
    const img = new Image();
    img.src = `/assets/images/planets/${name}.jpg`;
    img.onerror = () => console.log(`Image not found: ${name}.jpg`);
    return img;
  }

  // Realistic planet data
  const planets = [
    { 
      name: "Sun", 
      size: 40, 
      img: loadImg("sun"),
      rotationPeriod: 609.12,
      revolutionPeriod: 0,
      distanceFromSun: 0,
      diameter: 1391000,
      color: "#FDB813"
    },
    { 
      name: "Mercury", 
      a: 70, b: 60, size: 5, period: 4, 
      img: loadImg("mercury"),
      rotationPeriod: 1407.6,
      revolutionPeriod: 88,
      distanceFromSun: 57.9,
      diameter: 3824,
      color: "#8C7853"
    },
    { 
      name: "Venus", 
      a: 100, b: 85, size: 8, period: 7, 
      img: loadImg("venus"),
      rotationPeriod: 5832.5,
      revolutionPeriod: 225,
      distanceFromSun: 108.2,
      diameter: 12104,
      color: "#FFC649"
    },
    { 
      name: "Earth", 
      a: 130, b: 110, size: 9, period: 10, 
      img: loadImg("earth"),
      rotationPeriod: 24,
      revolutionPeriod: 365.25,
      distanceFromSun: 149.6,
      diameter: 12742,
      color: "#4A90E2"
    },
    { 
      name: "Mars", 
      a: 160, b: 135, size: 7, period: 15, 
      img: loadImg("mars"),
      rotationPeriod: 24.6,
      revolutionPeriod: 687,
      distanceFromSun: 227.9,
      diameter: 6779,
      color: "#E74C3C"
    },
    { 
      name: "Jupiter", 
      a: 210, b: 180, size: 18, period: 25, 
      img: loadImg("jupiter"),
      rotationPeriod: 9.9,
      revolutionPeriod: 4333,
      distanceFromSun: 778.5,
      diameter: 139820,
      color: "#C88B3A"
    },
    { 
      name: "Saturn", 
      a: 250, b: 210, size: 16, period: 30, 
      img: loadImg("saturn"),
      rotationPeriod: 10.7,
      revolutionPeriod: 10759,
      distanceFromSun: 1434,
      diameter: 116460,
      rings: true,
      color: "#FAD5A5"
    },
    { 
      name: "Uranus", 
      a: 290, b: 245, size: 12, period: 35, 
      img: loadImg("uranus"),
      rotationPeriod: 17.2,
      revolutionPeriod: 30688,
      distanceFromSun: 2871,
      diameter: 50724,
      color: "#4FD0E7"
    },
    { 
      name: "Neptune", 
      a: 330, b: 280, size: 12, period: 40, 
      img: loadImg("neptune"),
      rotationPeriod: 16.1,
      revolutionPeriod: 60182,
      distanceFromSun: 4495.1,
      diameter: 49244,
      color: "#4166F5"
    }
  ];

  planets.forEach(p => {
    p.angle = Math.random() * Math.PI * 2;
    p.rotationAngle = Math.random() * Math.PI * 2;
  });

  const asteroids = Array.from({ length: 300 }, () => ({
    angle: Math.random() * Math.PI * 2,
    radius: 185 + Math.random() * 20
  }));

  function formatNumber(num) {
    if (num >= 1000) return (num / 1000).toFixed(1) + "k";
    return num.toFixed(1);
  }

  function drawStars() {
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    for (let i = 0; i < 200; i++) {
      const x = (i * 79) % canvas.width;
      const y = (i * 137) % canvas.height;
      const size = Math.random() * 1.5;
      ctx.fillRect(x, y, size, size);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawStars();

    // Orbits
    planets.forEach(p => {
      if (!p.a) return;
      ctx.strokeStyle = hovered === p ? "#4a9fff" : "rgba(74, 159, 255, 0.15)";
      ctx.lineWidth = hovered === p ? 2 : 1;
      ctx.beginPath();
      ctx.ellipse(center.x, center.y, p.a * zoom, p.b * zoom, 0, 0, Math.PI * 2);
      ctx.stroke();

      if (teacherMode) {
        ctx.fillStyle = "rgba(74, 159, 255, 0.5)";
        ctx.font = "bold 11px Arial";
        const labelRadius = p.a * zoom + 18;
        const labelX = center.x + Math.cos(0) * labelRadius;
        const labelY = center.y + Math.sin(0) * labelRadius;
        ctx.fillText(`${p.revolutionPeriod}d`, labelX, labelY);
      }
    });

    // Asteroids
    ctx.fillStyle = "#888";
    asteroids.forEach(a => {
      const x = center.x + Math.cos(a.angle) * a.radius * zoom;
      const y = center.y + Math.sin(a.angle) * a.radius * zoom;
      ctx.fillRect(x, y, 1, 1);
      if (!paused) a.angle += 0.001 * speed;
    });

    // Planets
    planets.forEach(p => {
      let x = center.x, y = center.y;
      if (p.a) {
        x += Math.cos(p.angle) * p.a * zoom;
        y += Math.sin(p.angle) * p.b * zoom;
        if (!paused) {
          p.angle += 0.01 * speed / p.period;
          p.rotationAngle += 0.05 * speed / (p.rotationPeriod || 1);
        }
      } else {
        if (!paused) p.rotationAngle += 0.05 * speed / (p.rotationPeriod || 1);
      }

      p.x = x;
      p.y = y;

      // Draw planet
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, p.size * zoom, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(p.img, x - p.size * zoom, y - p.size * zoom, p.size * 2 * zoom, p.size * 2 * zoom);
      ctx.restore();

      // Rotation indicators
      if ((teacherMode || hovered === p) && p.a) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 4; i++) {
          const angle = p.rotationAngle + (i * Math.PI / 2);
          const x1 = x + Math.cos(angle) * p.size * zoom * 0.75;
          const y1 = y + Math.sin(angle) * p.size * zoom * 0.75;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        }
        ctx.restore();
      }

      // Rings
      if (p.rings) {
        ctx.strokeStyle = "rgba(250,213,165,0.5)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y, p.size * 1.6 * zoom, p.size * 0.7 * zoom, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Labels
      if (teacherMode || hovered === p) {
        ctx.fillStyle = "#4a9fff";
        ctx.font = "bold 13px Arial";
        ctx.fillText(p.name, x + 12, y - 14);

        if (teacherMode && p.a) {
          ctx.strokeStyle = "rgba(100,200,255,0.4)";
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(x - p.size * zoom * 1.3, y);
          ctx.lineTo(x + p.size * zoom * 1.3, y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    });

    // Teacher legend
    if (teacherMode) {
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(12, 12, 300, 140);
      ctx.strokeStyle = "#4a9fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(12, 12, 300, 140);
      
      ctx.fillStyle = "#4a9fff";
      ctx.font = "bold 14px Arial";
      ctx.fillText("📚 TEACHER MODE", 22, 35);
      
      ctx.fillStyle = "#ddd";
      ctx.font = "12px Arial";
      ctx.fillText("• Dashed line = Rotation axis", 22, 55);
      ctx.fillText("• Lines on planet = Rotation", 22, 75);
      ctx.fillText("• Orbit path = Revolution", 22, 95);
      ctx.fillText("• Days = Revolution period", 22, 115);
      ctx.fillText("• 1 unit ≈ faster animation", 22, 135);
    }

    requestAnimationFrame(draw);
  }

  canvas.addEventListener("mousemove", e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    hovered = null;

    planets.forEach(p => {
      if (Math.hypot(mx - p.x, my - p.y) < p.size * zoom + 5) hovered = p;
    });

    if (hovered) {
      infoBox.style.display = "block";
      let html = `<b>${hovered.name}</b>`;
      
      if (hovered.name !== "Sun") {
        html += `<div class="info-item">🌍 <strong>Year:</strong> ${hovered.revolutionPeriod} Earth days</div>`;
      }
      
      html += `<div class="info-item">🔄 <strong>Day:</strong> ${hovered.rotationPeriod} hours</div>`;
      
      if (hovered.distanceFromSun > 0) {
        html += `<div class="info-item">📏 <strong>Distance:</strong> ${hovered.distanceFromSun} M km</div>`;
      }
      
      html += `<div class="info-item">⭕ <strong>Diameter:</strong> ${formatNumber(hovered.diameter)} km</div>`;
      
      infoBox.innerHTML = html;
    } else {
      infoBox.style.display = "none";
    }
  });

  canvas.addEventListener("click", () => {
    if (!hovered) return;
    const utter = new SpeechSynthesisUtterance(hovered.name);
    speechSynthesis.speak(utter);

    if (hovered.name === quizTarget) {
      document.getElementById("quizResult").textContent = " ✅ Correct!";
      setTimeout(() => { document.getElementById("quizResult").textContent = ""; }, 2000);
    } else {
      document.getElementById("quizResult").textContent = " ❌ Try again!";
      setTimeout(() => { document.getElementById("quizResult").textContent = ""; }, 1500);
    }
  });

  document.getElementById("pauseBtn").onclick = () => { paused = true; document.getElementById("pauseBtn").style.opacity = "0.5"; document.getElementById("playBtn").style.opacity = "1"; };
  document.getElementById("playBtn").onclick = () => { paused = false; document.getElementById("playBtn").style.opacity = "0.5"; document.getElementById("pauseBtn").style.opacity = "1"; };
  document.getElementById("teacherBtn").onclick = () => { teacherMode = !teacherMode; document.getElementById("teacherBtn").style.opacity = teacherMode ? "0.5" : "1"; };
  document.getElementById("resetBtn").onclick = () => { zoom = 1; document.getElementById("zoomControl").value = 1; };
  document.getElementById("speedControl").oninput = e => speed = e.target.value;
  document.getElementById("zoomControl").oninput = e => zoom = e.target.value;

  draw();
</script>

</body>
</html>
